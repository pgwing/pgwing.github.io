<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Southern Arizona</title>
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #d2b48c;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }
        .container {
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        .legend {
            background: white;
            padding: 8px;
            line-height: 18px;
            color: #333;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .legend.leaflet-control {
            margin-bottom: 0;
            margin-top: 96px;
        }
        .legend i {
            width: 12px;
            height: 12px;
            float: left;
            margin-right: 6px;
            opacity: 0.8;
        }
        .water-icon {
            width: 12px;
            height: 12px;
            background: blue;
            transform: rotate(45deg);
            border: 1px solid #002f8a;
            box-shadow: 0 0 2px rgba(0,0,0,0.3);
        }
        .death-icon {
            width: 10px;
            height: 10px;
            background: red;
            border: 1px solid #8b0000;
            box-shadow: 0 0 2px rgba(0,0,0,0.3);
        }
        .measure-button {
            background: #fffacd;
            color: #17324d;
            border: 1px solid #b8c7d6;
            border-radius: 4px;
            box-shadow: none;
            font-weight: 600;
            font-family: Arial, sans-serif;
            font-size: 13px;
            min-width: 110px;
            height: 36px;
            line-height: 36px;
            text-align: center;
            white-space: nowrap;
            padding: 0 12px !important;
            transition: background 0.2s ease;
        }
        .measure-button:hover {
            background: #ffff99;
        }
        .measure-button:active {
            background: #ffff80;
        }
        .leaflet-control-layers-toggle {
            background: #fffacd !important;
            background-image: none !important;
            width: auto !important;
            min-width: 110px;
            height: 36px;
            padding: 0 12px;
            text-indent: 0;
            font: 600 13px/36px Arial, sans-serif;
            color: #000;
            text-decoration: none;
        }
        .leaflet-control-layers-toggle:hover,
        .leaflet-control-layers-toggle:focus,
        .leaflet-control-layers-toggle:active,
        .leaflet-control-layers-toggle:visited {
            color: #000;
            text-decoration: none;
        }
        .leaflet-touch .leaflet-control-layers-toggle {
            width: auto !important;
            height: 36px;
        }
        .leaflet-control-layers-toggle::after {
            content: 'Map Layers';
        }
        .leaflet-control-layers .leaflet-control-layers-list {
            display: none !important;
        }
        .leaflet-control-layers.leaflet-control-layers-expanded .leaflet-control-layers-list {
            display: block !important;
        }
        .map-control-button {
            background: #fffacd;
            color: #17324d;
            border: 1px solid #b8c7d6;
            border-radius: 4px;
            min-width: 110px;
            height: 36px;
            padding: 0 12px;
            font: 600 13px/36px Arial, sans-serif;
            text-align: center;
            white-space: nowrap;
            cursor: pointer;
        }
        .map-control-button:hover {
            background: #ffff99;
        }
        .map-control-button:active {
            background: #ffff80;
        }
        .map-control-panel {
            display: none;
            margin-top: 8px;
            background: #ffffff;
            padding: 8px;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            width: 260px;
        }
        .map-control-panel.open {
            display: block;
        }
        .time-control {
            background: #ffffff;
            padding: 8px 10px;
            border-radius: 6px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            width: 240px;
        }
        .time-control-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #17324d;
            margin-bottom: 6px;
        }
        .time-control-value {
            font-size: 12px;
            color: #333;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .time-control input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
        var map = L.map('map', {
            zoomSnap: 0.5
        }).setView([31.8800834, -111.5459306], 8.5);
        map.createPane('countyBoundaryPane');
        map.getPane('countyBoundaryPane').style.zIndex = 650;
        map.createPane('waterStationsPane');
        map.getPane('waterStationsPane').style.zIndex = 700;

        var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        });

        var terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors, <a href="https://opentopomap.org">OpenTopoMap</a> (CC-BY-SA)',
            subdomains: 'abc',
            minZoom: 0,
            maxZoom: 17
        });

        var waterStationsLayerGroup = L.layerGroup().addTo(map);
        var migrantLayerGroup = L.layerGroup();
        var deathsOutsideLayerGroup = L.layerGroup();
        var deathsInReservationLayerGroup = L.layerGroup();
        var summerDeathsLayerGroup = L.layerGroup();
        var restOfYearDeathsLayerGroup = L.layerGroup();
        var deaths10MilesFromWaterLayerGroup = L.layerGroup();
        var deathsHeatLayerGroup = L.layerGroup();
        var deathsInReservationHeatLayerGroup = L.layerGroup();
        var distanceMeasureLayerGroup = L.layerGroup().addTo(map);

        var waterStationPoints = [];
        var outsideReservationDeathFeatures = [];
        var allOutsideReservationDeathFeatures = [];
        var allInReservationDeathFeatures = [];
        var measurementEnabled = false;
        var currentMeasureRequestId = 0;
        var lastMeasuredDeathLatLng = null;
        var migrantDeathsLayerEnabled = false;
        var hideReservationDeathsEnabled = false;
        var timelineEnabled = false;
        var timelineEntries = [];
        var currentTimelineIndex = 0;
        var timelineRangeInput = null;
        var timelineValueLabel = null;
        var timelineControlContainer = null;
        var renderDeathLayers = function () {};
        const INTERACTIVE_HIT_WEIGHT = 10;
        const INTERACTIVE_HIT_OPACITY = 0.01;
        const ALLOWED_DEATH_COUNTIES = new Set(['yuma', 'pima', 'santa cruz']);

        // If your AGOL layers are private, paste a valid token string here.
        // Leave empty for public services.
        const AGOL_TOKEN = '';

        function getPointCoordinates(feature) {
            const geom = feature && feature.geometry ? feature.geometry : {};
            const coords = geom.coordinates || [];
            if (!Array.isArray(coords) || coords.length < 2) return null;
            return [coords[0], coords[1]]; // [lon, lat]
        }

        function textContainsTohonoOodham(value) {
            if (typeof value !== 'string') return false;
            const normalized = value.toLowerCase();
            return normalized.includes('tohono') || normalized.includes('oodham') || normalized.includes("o'odham") || normalized.includes('o odham');
        }

        function isTohonoOodhamReservation(feature) {
            if (!feature || !feature.properties) return false;
            return Object.values(feature.properties).some(textContainsTohonoOodham);
        }

        function normalizeCountyName(value) {
            return String(value || '')
                .trim()
                .toLowerCase()
                .replace(/_/g, ' ')
                .replace(/\bcounty\b/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function getFeatureCounty(feature) {
            const props = feature && (feature.properties || feature.attributes) ? (feature.properties || feature.attributes) : {};
            const county = props.COUNTY || props.County || props.county || '';
            return normalizeCountyName(county);
        }

        function isAllowedDeathCounty(feature) {
            return ALLOWED_DEATH_COUNTIES.has(getFeatureCounty(feature));
        }

        function isAllowedTargetCounty(value) {
            const normalized = normalizeCountyName(value);
            return !normalized || ALLOWED_DEATH_COUNTIES.has(normalized);
        }

        function getDeathDateParts(feature) {
            const props = feature && (feature.properties || feature.attributes) ? (feature.properties || feature.attributes) : {};
            const raw = props.DATE || props.Date || props.date || '';

            if (typeof raw === 'number' && Number.isFinite(raw)) {
                const asDate = raw > 1e11 ? new Date(raw) : (raw > 1e9 ? new Date(raw * 1000) : null);
                if (asDate && !Number.isNaN(asDate.getTime())) {
                    return {
                        year: asDate.getUTCFullYear(),
                        month: asDate.getUTCMonth() + 1
                    };
                }
            }

            const text = String(raw).trim();
            if (!text) return null;

            const slashMatch = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
            if (slashMatch) {
                const month = Number(slashMatch[1]);
                const year = Number(slashMatch[3]);
                if (Number.isFinite(month) && Number.isFinite(year)) {
                    return { year, month };
                }
            }

            const parsed = new Date(text);
            if (Number.isNaN(parsed.getTime())) return null;
            return {
                year: parsed.getUTCFullYear(),
                month: parsed.getUTCMonth() + 1
            };
        }

        function getDeathMonth(feature) {
            const parts = getDeathDateParts(feature);
            return parts ? parts.month : null;
        }

        function isSummerDeath(feature) {
            const month = getDeathMonth(feature);
            return month === 6 || month === 7 || month === 8 || month === 9;
        }

        function isRestOfYearDeath(feature) {
            const month = getDeathMonth(feature);
            return month === 10 || month === 11 || month === 12 || month === 1 || month === 2 || month === 3 || month === 4 || month === 5;
        }

        function getDeathMonthIndex(feature) {
            const parts = getDeathDateParts(feature);
            return parts ? (parts.year * 12) + (parts.month - 1) : null;
        }

        function buildTimelineEntries(features) {
            const keys = features
                .map(getDeathMonthIndex)
                .filter(value => Number.isFinite(value))
                .sort((a, b) => a - b);

            if (keys.length === 0) return [];

            const entries = [];
            const january2021Key = (2021 * 12);
            const startKey = january2021Key;
            for (let key = startKey; key <= keys[keys.length - 1]; key += 1) {
                entries.push({
                    key,
                    year: Math.floor(key / 12),
                    month: (key % 12) + 1
                });
            }
            return entries;
        }

        function formatTimelineEntry(entry) {
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            return `${monthNames[entry.month - 1]} ${entry.year}`;
        }

        function featurePassesTimeline(feature) {
            if (!timelineEnabled) return true;
            if (!timelineEntries.length) return true;
            const featureKey = getDeathMonthIndex(feature);
            if (!Number.isFinite(featureKey)) return false;
            const activeEntry = timelineEntries[Math.min(currentTimelineIndex, timelineEntries.length - 1)];
            return featureKey === activeEntry.key;
        }

        function setTimelineControlVisibility(visible) {
            if (!timelineControlContainer) return;
            timelineControlContainer.style.display = visible ? 'block' : 'none';
        }

        function updateTimelineControl() {
            if (!timelineRangeInput || !timelineValueLabel) return;

            if (!timelineEntries.length) {
                timelineRangeInput.disabled = true;
                timelineRangeInput.min = '0';
                timelineRangeInput.max = '0';
                timelineRangeInput.value = '0';
                timelineValueLabel.textContent = 'Timeline unavailable';
                return;
            }

            currentTimelineIndex = Math.max(0, Math.min(currentTimelineIndex, timelineEntries.length - 1));
            timelineRangeInput.disabled = false;
            timelineRangeInput.min = '0';
            timelineRangeInput.max = String(timelineEntries.length - 1);
            timelineRangeInput.value = String(currentTimelineIndex);
            timelineValueLabel.textContent = `Showing deaths in ${formatTimelineEntry(timelineEntries[currentTimelineIndex])}`;
        }

        function setTimelineIndex(index) {
            if (!timelineEntries.length) return;
            currentTimelineIndex = Math.max(0, Math.min(index, timelineEntries.length - 1));
            updateTimelineControl();
            renderDeathLayers();
        }

        function isPointInsideAnyReservation(lon, lat, reservationFeatures) {
            if (typeof turf === 'undefined' || !Array.isArray(reservationFeatures) || reservationFeatures.length === 0) {
                return false;
            }

            const pt = turf.point([lon, lat]);
            for (const polyFeature of reservationFeatures) {
                try {
                    if (turf.booleanPointInPolygon(pt, polyFeature)) return true;
                } catch (_err) {
                    // Skip malformed geometries and continue checking others.
                }
            }
            return false;
        }

        function findNearestWaterStation(deathLatLng) {
            if (!deathLatLng || waterStationPoints.length === 0) return null;

            let nearest = null;
            let nearestMeters = Infinity;
            waterStationPoints.forEach(station => {
                const meters = map.distance(deathLatLng, station.latlng);
                if (meters < nearestMeters) {
                    nearestMeters = meters;
                    nearest = station;
                }
            });

            if (!nearest) return null;
            return { station: nearest, meters: nearestMeters };
        }

        function refresh10MilesFromWaterLayer() {
            deaths10MilesFromWaterLayerGroup.clearLayers();

            if (!Array.isArray(outsideReservationDeathFeatures) || outsideReservationDeathFeatures.length === 0) return;
            if (!Array.isArray(waterStationPoints) || waterStationPoints.length === 0) return;

            const thresholdMeters = 10 * 1609.344;
            outsideReservationDeathFeatures.forEach(feature => {
                const props = feature.properties || feature.attributes || {};
                const coords = getPointCoordinates(feature);
                if (!coords) return;

                const deathLatLng = L.latLng(coords[1], coords[0]);
                const nearest = findNearestWaterStation(deathLatLng);
                if (!nearest || nearest.meters <= thresholdMeters) return;

                const miles = nearest.meters / 1609.344;
                const marker = L.circleMarker(deathLatLng, {
                    radius: 4,
                    color: '#c2578a',
                    weight: INTERACTIVE_HIT_WEIGHT,
                    opacity: INTERACTIVE_HIT_OPACITY,
                    fillColor: '#e07cab',
                    fillOpacity: 0.95
                });

                marker.bindPopup(
                    `Sex: ${props.SEX || props.Sex || props.sex || 'N/A'}<br>` +
                    `Age: ${props.AGE || props.Age || props.age || 'N/A'}<br>` +
                    `Nearest water distance: ${miles.toFixed(2)} miles`
                );
                marker.on('click', function () {
                    if (measurementEnabled) {
                        measureToNearestWater(marker.getLatLng());
                    }
                });

                marker.addTo(deaths10MilesFromWaterLayerGroup);
            });
        }

        function getRouteProfile() {
            const select = document.getElementById('routeProfileMap');
            const value = select ? select.value : 'driving';
            if (value === 'walking') return 'walking';
            if (value === 'straight') return 'straight';
            return 'driving';
        }

        function formatRouteMode(profile) {
            if (profile === 'walking') return 'Walking';
            if (profile === 'straight') return 'Straight line';
            return 'Driving';
        }

        function isSameMeasuredPoint(a, b) {
            if (!a || !b) return false;
            return map.distance(a, b) < 1;
        }

        async function fetchRouteMetrics(startLatLng, endLatLng, profile) {
            const start = `${startLatLng.lng},${startLatLng.lat}`;
            const end = `${endLatLng.lng},${endLatLng.lat}`;
            const url = `https://router.project-osrm.org/route/v1/${profile}/${start};${end}?overview=full&geometries=geojson`;

            const response = await fetch(url);
            if (!response.ok) throw new Error('Routing request failed');

            const data = await response.json();
            const route = data && Array.isArray(data.routes) ? data.routes[0] : null;
            if (!route || !route.geometry || !Array.isArray(route.geometry.coordinates)) {
                throw new Error('No route returned');
            }

            return {
                meters: Number(route.distance),
                coordinates: route.geometry.coordinates
            };
        }

        async function measureToNearestWater(deathLatLng) {
            const requestId = ++currentMeasureRequestId;
            const result = findNearestWaterStation(deathLatLng);
            const output = document.getElementById('measureOutput');
            const outputMap = document.getElementById('measureOutputMap');
            const profile = getRouteProfile();
            const modeLabel = formatRouteMode(profile);
            const hasActiveMeasurement = distanceMeasureLayerGroup.getLayers().length > 0;

            if (hasActiveMeasurement && isSameMeasuredPoint(deathLatLng, lastMeasuredDeathLatLng)) {
                distanceMeasureLayerGroup.clearLayers();
                lastMeasuredDeathLatLng = null;
                if (output) output.textContent = `Measurement is on (${modeLabel}). Click any death point to measure to the nearest water station.`;
                if (outputMap) outputMap.textContent = `Measurement is on (${modeLabel}). Click any death point to measure to the nearest water station.`;
                return;
            }

            distanceMeasureLayerGroup.clearLayers();

            if (!result) {
                if (output) output.textContent = 'No water stations available for distance measurement yet.';
                if (outputMap) outputMap.textContent = 'No water stations available for distance measurement yet.';
                return;
            }

            if (profile === 'straight') {
                if (output) output.textContent = 'Calculating straight-line distance...';
                if (outputMap) outputMap.textContent = 'Calculating straight-line distance...';
            } else {
                if (output) output.textContent = `Calculating ${modeLabel.toLowerCase()} route...`;
                if (outputMap) outputMap.textContent = `Calculating ${modeLabel.toLowerCase()} route...`;
            }

            let meters = result.meters;
            let usedRoute = false;
            let routeLatLngs = [deathLatLng, result.station.latlng];

            if (profile !== 'straight') {
                try {
                    const routeResult = await fetchRouteMetrics(deathLatLng, result.station.latlng, profile);
                    if (requestId !== currentMeasureRequestId) return;

                    if (Number.isFinite(routeResult.meters)) {
                        meters = routeResult.meters;
                    }

                    routeLatLngs = routeResult.coordinates.map(coord => L.latLng(coord[1], coord[0]));
                    usedRoute = routeLatLngs.length > 1;
                } catch (_err) {
                    // Keep straight-line fallback if routing is unavailable.
                }
            }

            if (requestId !== currentMeasureRequestId) return;

            const miles = meters / 1609.344;

            const line = L.polyline(routeLatLngs, {
                color: '#1f5fa8',
                weight: 3,
                opacity: 0.9,
                dashArray: usedRoute ? null : '8, 6'
            }).addTo(distanceMeasureLayerGroup);

            L.circleMarker(deathLatLng, {
                radius: 6,
                color: '#5a0000',
                weight: INTERACTIVE_HIT_WEIGHT,
                opacity: INTERACTIVE_HIT_OPACITY,
                fillColor: '#5a0000',
                fillOpacity: 1
            }).addTo(distanceMeasureLayerGroup);

            L.circleMarker(result.station.latlng, {
                radius: 7,
                color: '#0057d9',
                weight: INTERACTIVE_HIT_WEIGHT,
                opacity: INTERACTIVE_HIT_OPACITY,
                fillColor: '#1e88ff',
                fillOpacity: 1
            }).addTo(distanceMeasureLayerGroup);

            line.bindPopup(
                `Closest station: ${result.station.name}<br>` +
                `Mode: ${modeLabel}${usedRoute ? '' : ' (straight-line fallback)'}<br>` +
                `Distance: ${miles.toFixed(2)} miles (${meters.toFixed(0)} m)`
            ).openPopup();

            const resultHtml =
                `<strong>Nearest-water distance</strong><br>` +
                `Closest station: ${result.station.name}<br>` +
                `Mode: ${modeLabel}${usedRoute ? '' : ' (straight-line fallback)'}<br>` +
                `Distance: ${miles.toFixed(2)} miles (${meters.toFixed(0)} m)`;

            if (output) output.innerHTML = resultHtml;
            if (outputMap) outputMap.innerHTML = resultHtml;
            lastMeasuredDeathLatLng = L.latLng(deathLatLng.lat, deathLatLng.lng);
        }

        function setMeasurementEnabled(enabled) {
            measurementEnabled = enabled;

            const output = document.getElementById('measureOutput');
            const btnMap = document.getElementById('toggleMeasureMap');
            const outputMap = document.getElementById('measureOutputMap');

            if (enabled) {
                if (btnMap) btnMap.textContent = 'Disable nearest-water measure';
                if (output) output.textContent = `Measurement is on (${formatRouteMode(getRouteProfile())}). Click any death point to measure to the nearest water station.`;
                if (outputMap) outputMap.textContent = `Measurement is on (${formatRouteMode(getRouteProfile())}). Click any death point to measure to the nearest water station.`;
            } else {
                if (btnMap) btnMap.textContent = 'Enable nearest-water measure';
                if (output) output.textContent = 'Nearest-water measure is off.';
                if (outputMap) outputMap.textContent = 'Nearest-water measure is off.';
                distanceMeasureLayerGroup.clearLayers();
                lastMeasuredDeathLatLng = null;
            }
        }

        function applyReservationVisibility() {
            if (!migrantDeathsLayerEnabled || hideReservationDeathsEnabled) {
                map.removeLayer(deathsInReservationLayerGroup);
                map.removeLayer(deathsInReservationHeatLayerGroup);
                return;
            }

            deathsInReservationLayerGroup.addTo(map);
            deathsInReservationHeatLayerGroup.addTo(map);
        }

        var MigrantDeathsToggleLayer = L.Layer.extend({
            onAdd: function () {
                migrantDeathsLayerEnabled = true;
                migrantLayerGroup.addTo(map);
                deathsHeatLayerGroup.addTo(map);
                applyReservationVisibility();
            },
            onRemove: function () {
                migrantDeathsLayerEnabled = false;
                map.removeLayer(migrantLayerGroup);
                map.removeLayer(deathsHeatLayerGroup);
                map.removeLayer(deathsInReservationLayerGroup);
                map.removeLayer(deathsInReservationHeatLayerGroup);
            }
        });

        var HideReservationToggleLayer = L.Layer.extend({
            onAdd: function () {
                hideReservationDeathsEnabled = true;
                applyReservationVisibility();
            },
            onRemove: function () {
                hideReservationDeathsEnabled = false;
                applyReservationVisibility();
            }
        });

        var TimelineToggleLayer = L.Layer.extend({
            onAdd: function () {
                timelineEnabled = true;
                setTimelineControlVisibility(true);
                updateTimelineControl();
                renderDeathLayers();
            },
            onRemove: function () {
                timelineEnabled = false;
                setTimelineControlVisibility(false);
                renderDeathLayers();
            }
        });

        var migrantDeathsToggleLayer = new MigrantDeathsToggleLayer();
        var hideReservationToggleLayer = new HideReservationToggleLayer();
        var timelineToggleLayer = new TimelineToggleLayer();

        // Draw Arizona county boundaries as a static reference overlay.
        async function loadArizonaCountyBoundaries() {
            const countiesGeoJsonUrl = 'https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json';

            try {
                const response = await fetch(countiesGeoJsonUrl);
                if (!response.ok) throw new Error('County boundary request failed');

                const geojson = await response.json();
                const features = Array.isArray(geojson && geojson.features) ? geojson.features : [];
                const arizonaFeatures = features.filter(feature => {
                    const fips = String(feature && feature.id ? feature.id : '');
                    return fips.startsWith('04');
                });

                if (arizonaFeatures.length === 0) {
                    throw new Error('No Arizona county features found');
                }

                L.geoJSON({
                    type: 'FeatureCollection',
                    features: arizonaFeatures
                }, {
                    pane: 'countyBoundaryPane',
                    interactive: false,
                    style: {
                        color: '#3f2f20',
                        weight: 2.2,
                        opacity: 0.98,
                        fill: false
                    }
                }).addTo(map);
            } catch (err) {
                console.warn('Arizona county boundaries failed to load:', err);
            }
        }

        loadArizonaCountyBoundaries();

        streetLayer.addTo(map);

        var layersControl = L.control.layers(null, {
            'Water Stations': waterStationsLayerGroup,
            'Migrant Deaths': migrantDeathsToggleLayer,
            'Hide deaths on reservation': hideReservationToggleLayer,
            'Time slider': timelineToggleLayer,
            'Deaths in June, July, August, and September': summerDeathsLayerGroup,
            'Deaths the rest of the year': restOfYearDeathsLayerGroup,
            'Deaths > 10 miles from water station': deaths10MilesFromWaterLayerGroup
        }).addTo(map);

        migrantDeathsToggleLayer.addTo(map);

        // Use click-to-toggle for layers on desktop instead of hover-to-open.
        var layersContainer = layersControl.getContainer();
        if (layersContainer) {
            L.DomEvent.off(layersContainer, 'mouseenter', layersControl.expand, layersControl);
            L.DomEvent.off(layersContainer, 'mouseleave', layersControl.collapse, layersControl);
            L.DomEvent.off(layersContainer, 'mouseover', layersControl.expand, layersControl);
            L.DomEvent.off(layersContainer, 'mouseout', layersControl.collapse, layersControl);
            L.DomEvent.off(layersContainer, 'mouseenter', layersControl._expandSafely, layersControl);
            L.DomEvent.off(layersContainer, 'mouseover', layersControl._expandSafely, layersControl);

            var layersToggle = layersContainer.querySelector('.leaflet-control-layers-toggle');
            var layersList = layersContainer.querySelector('.leaflet-control-layers-list');
            var layersOpen = false;

            if (layersList) {
                layersList.style.display = 'none';
            }

            if (layersToggle) {
                L.DomEvent.on(layersToggle, 'mousedown', L.DomEvent.stopPropagation);
                L.DomEvent.on(layersToggle, 'click', function (e) {
                    L.DomEvent.stop(e);
                    layersOpen = !layersOpen;

                    if (layersOpen) {
                        L.DomUtil.addClass(layersContainer, 'leaflet-control-layers-expanded');
                        if (layersList) layersList.style.display = 'block';
                    } else {
                        L.DomUtil.removeClass(layersContainer, 'leaflet-control-layers-expanded');
                        if (layersList) layersList.style.display = 'none';
                    }
                });
            }
        }

        async function resolveFeatureLayerUrl(serviceUrl) {
            if (/\/FeatureServer\/\d+$/.test(serviceUrl)) {
                return serviceUrl;
            }

            try {
                const response = await fetch(serviceUrl + '?f=pjson');
                const info = await response.json();
                if (info && Array.isArray(info.layers) && info.layers.length > 0) {
                    return serviceUrl + '/' + info.layers[0].id;
                }
            } catch (err) {
                console.warn('Could not resolve layer id for service:', serviceUrl, err);
            }

            return serviceUrl + '/0';
        }

        async function initAgolLayers() {
            const waterBufferLayerUrl = await resolveFeatureLayerUrl('https://services.arcgis.com/o6oETlrWetREI1A2/arcgis/rest/services/water_3_mile_buffer/FeatureServer');
            const migrantDeathsLayerUrl = await resolveFeatureLayerUrl('https://services.arcgis.com/o6oETlrWetREI1A2/arcgis/rest/services/migrant_deaths_2021_2025/FeatureServer');
            const deathsOutsideLayerUrl = await resolveFeatureLayerUrl('https://services.arcgis.com/o6oETlrWetREI1A2/arcgis/rest/services/deaths_outside_buffers/FeatureServer');
            const reservationsLayerUrl = await resolveFeatureLayerUrl('https://services.arcgis.com/o6oETlrWetREI1A2/arcgis/rest/services/American_Indian_Reservations_in_Arizona/FeatureServer');

            // Force uniform death symbols: small dark-red circles.
            const deathPointToLayer = function (_geojson, latlng) {
                return L.circleMarker(latlng, {
                    radius: 4,
                    color: '#5a0000',
                    weight: INTERACTIVE_HIT_WEIGHT,
                    opacity: INTERACTIVE_HIT_OPACITY,
                    fillColor: '#5a0000',
                    fillOpacity: 0.95
                });
            };

            const reservationDeathPointToLayer = function (_geojson, latlng) {
                return L.circleMarker(latlng, {
                    radius: 4,
                    color: '#5a0000',
                    weight: INTERACTIVE_HIT_WEIGHT,
                    opacity: INTERACTIVE_HIT_OPACITY,
                    fillColor: '#5a0000',
                    fillOpacity: 0.95
                });
            };

            // Draw water station points as blue circles using each water feature's station coordinates.
            const waterStationsQueryLayer = L.esri.featureLayer({
                url: waterBufferLayerUrl,
                token: AGOL_TOKEN || undefined
            });

            waterStationsQueryLayer.query().where('1=1').run(function (error, featureCollection) {
                if (error) {
                    console.error('Failed to load water station features:', error);
                    return;
                }

                const features = (featureCollection && featureCollection.features) ? featureCollection.features : [];
                waterStationPoints = [];
                features.forEach(feature => {
                    const props = feature.properties || feature.attributes || {};
                    const stationCounty = props.COUNTY || props.County || props.county || props.COUNTY_NAME || props.county_name || '';
                    if (!isAllowedTargetCounty(stationCounty)) return;
                    const coords = getPointCoordinates(feature);

                    let latlng = null;
                    if (coords) {
                        latlng = L.latLng(coords[1], coords[0]);
                    } else {
                        try {
                            const bounds = L.geoJSON(feature).getBounds();
                            if (bounds.isValid()) {
                                latlng = bounds.getCenter();
                            }
                        } catch (_err) {
                            // Skip malformed geometries.
                        }
                    }

                    const latitude = Number(props.latitude);
                    const longitude = Number(props.longitude);
                    if (Number.isFinite(latitude) && Number.isFinite(longitude)) {
                        latlng = L.latLng(latitude, longitude);
                    }

                    if (!latlng) return;

                    const stationName = (props.name === null || props.name === undefined || String(props.name).trim() === '')
                        ? 'No station name available'
                        : String(props.name);

                    const stationTypeRaw =
                        props.type ||
                        props.TYPE ||
                        props.station_type ||
                        props.STATION_TYPE ||
                        props.stationType ||
                        props.TYPE_ ||
                        '';
                    const stationType = String(stationTypeRaw || '').replace(/_/g, ' ').trim() || 'Not provided';

                    const stationMarker = L.circleMarker(latlng, {
                        pane: 'waterStationsPane',
                        radius: 5,
                        color: '#0057d9',
                        weight: INTERACTIVE_HIT_WEIGHT,
                        opacity: INTERACTIVE_HIT_OPACITY,
                        fillColor: '#1e88ff',
                        fillOpacity: 0.95
                    }).bindPopup(
                        `<strong>${stationName}</strong><br>` +
                        `Type: ${stationType}`
                    );

                    stationMarker.on('click', function (e) {
                        if (e && e.originalEvent) {
                            L.DomEvent.stopPropagation(e.originalEvent);
                        }
                        stationMarker.openPopup();
                    });

                    stationMarker.addTo(waterStationsLayerGroup);
                    stationMarker.bringToFront();

                    waterStationPoints.push({
                        latlng: stationMarker.getLatLng(),
                        name: stationName
                    });
                });

                refresh10MilesFromWaterLayer();
            });

            const reservationsQueryLayer = L.esri.featureLayer({
                url: reservationsLayerUrl,
                token: AGOL_TOKEN || undefined
            });

            const tohonoReservationFeatures = await new Promise(resolve => {
                reservationsQueryLayer.query().where('1=1').run(function (error, featureCollection) {
                    if (error) {
                        console.error('Failed to load reservation features for death filtering:', error);
                        resolve([]);
                        return;
                    }
                    const features = (featureCollection && featureCollection.features) ? featureCollection.features : [];
                    resolve(features.filter(isTohonoOodhamReservation));
                });
            });

            // Query migrant deaths and render only those outside Tohono O'odham reservation land.
            const migrantDeathsQueryLayer = L.esri.featureLayer({
                url: migrantDeathsLayerUrl,
                token: AGOL_TOKEN || undefined
            });

            migrantDeathsQueryLayer.query().where('1=1').run(function (error, featureCollection) {
                if (error) {
                    console.error('Failed to load migrant deaths table from AGOL:', error);
                    return;
                }

                const allFeatures = (featureCollection && featureCollection.features) ? featureCollection.features : [];
                const countyFilteredFeatures = allFeatures.filter(isAllowedDeathCounty);
                const filteredFeatures = countyFilteredFeatures.filter(feature => {
                    const coords = getPointCoordinates(feature);
                    if (!coords) return false;
                    return !isPointInsideAnyReservation(coords[0], coords[1], tohonoReservationFeatures);
                });
                const inReservationFeatures = countyFilteredFeatures.filter(feature => {
                    const coords = getPointCoordinates(feature);
                    if (!coords) return false;
                    return isPointInsideAnyReservation(coords[0], coords[1], tohonoReservationFeatures);
                });

                allOutsideReservationDeathFeatures = filteredFeatures;
                allInReservationDeathFeatures = inReservationFeatures;
                timelineEntries = buildTimelineEntries(countyFilteredFeatures);
                currentTimelineIndex = 0;

                renderDeathLayers = function () {
                    const visibleOutsideFeatures = allOutsideReservationDeathFeatures.filter(featurePassesTimeline);
                    const visibleReservationFeatures = allInReservationDeathFeatures.filter(featurePassesTimeline);

                    outsideReservationDeathFeatures = visibleOutsideFeatures;
                    refresh10MilesFromWaterLayer();

                    migrantLayerGroup.clearLayers();
                    summerDeathsLayerGroup.clearLayers();
                    restOfYearDeathsLayerGroup.clearLayers();
                    deathsInReservationLayerGroup.clearLayers();

                    visibleOutsideFeatures.forEach(feature => {
                        const props = feature.properties || {};
                        const coords = getPointCoordinates(feature);
                        if (!coords) return;

                        const marker = deathPointToLayer(feature, L.latLng(coords[1], coords[0]));
                        marker.bindPopup(
                            `Sex: ${props.SEX || props.Sex || props.sex || 'N/A'}<br>` +
                            `Age: ${props.AGE || props.Age || props.age || 'N/A'}`
                        );
                        marker.on('click', function () {
                            if (measurementEnabled) {
                                measureToNearestWater(marker.getLatLng());
                            }
                        });
                        marker.addTo(migrantLayerGroup);

                        if (isSummerDeath(feature)) {
                            const summerMarker = L.circleMarker(L.latLng(coords[1], coords[0]), {
                                radius: 4,
                                color: '#b38b00',
                                weight: INTERACTIVE_HIT_WEIGHT,
                                opacity: INTERACTIVE_HIT_OPACITY,
                                fillColor: '#f4d03f',
                                fillOpacity: 0.95
                            });
                            summerMarker.bindPopup(
                                `Sex: ${props.SEX || props.Sex || props.sex || 'N/A'}<br>` +
                                `Age: ${props.AGE || props.Age || props.age || 'N/A'}`
                            );
                            summerMarker.on('click', function () {
                                if (measurementEnabled) {
                                    measureToNearestWater(summerMarker.getLatLng());
                                }
                            });
                            summerMarker.addTo(summerDeathsLayerGroup);
                        }

                        if (isRestOfYearDeath(feature)) {
                            const restOfYearMarker = L.circleMarker(L.latLng(coords[1], coords[0]), {
                                radius: 4,
                                color: '#2f7d32',
                                weight: INTERACTIVE_HIT_WEIGHT,
                                opacity: INTERACTIVE_HIT_OPACITY,
                                fillColor: '#63b66d',
                                fillOpacity: 0.95
                            });
                            restOfYearMarker.bindPopup(
                                `Sex: ${props.SEX || props.Sex || props.sex || 'N/A'}<br>` +
                                `Age: ${props.AGE || props.Age || props.age || 'N/A'}`
                            );
                            restOfYearMarker.on('click', function () {
                                if (measurementEnabled) {
                                    measureToNearestWater(restOfYearMarker.getLatLng());
                                }
                            });
                            restOfYearMarker.addTo(restOfYearDeathsLayerGroup);
                        }
                    });

                    visibleReservationFeatures.forEach(feature => {
                        const props = feature.properties || {};
                        const coords = getPointCoordinates(feature);
                        if (!coords) return;

                        const marker = reservationDeathPointToLayer(feature, L.latLng(coords[1], coords[0]));
                        marker.bindPopup(
                            `Sex: ${props.SEX || props.Sex || props.sex || 'N/A'}<br>` +
                            `Age: ${props.AGE || props.Age || props.age || 'N/A'}`
                        );
                        marker.on('click', function () {
                            if (measurementEnabled) {
                                measureToNearestWater(marker.getLatLng());
                            }
                        });
                        marker.addTo(deathsInReservationLayerGroup);
                    });

                    if (typeof L.heatLayer === 'function') {
                        const heatPoints = visibleOutsideFeatures
                            .map(feature => {
                                const coords = getPointCoordinates(feature);
                                if (!coords) return null;
                                return [coords[1], coords[0], 0.8];
                            })
                            .filter(Boolean);

                        const deathsHeatLayer = L.heatLayer(heatPoints, {
                            radius: 20,
                            blur: 15,
                            maxZoom: 11,
                            minOpacity: 0.35,
                            gradient: {
                                0.2: '#5a0000',
                                0.5: '#8b0000',
                                0.8: '#b22222',
                                1.0: '#ff4d4d'
                            }
                        });

                        deathsHeatLayerGroup.clearLayers();
                        deathsHeatLayerGroup.addLayer(deathsHeatLayer);

                        const reservationHeatPoints = visibleReservationFeatures
                            .map(feature => {
                                const coords = getPointCoordinates(feature);
                                if (!coords) return null;
                                return [coords[1], coords[0], 0.8];
                            })
                            .filter(Boolean);

                        const reservationDeathsHeatLayer = L.heatLayer(reservationHeatPoints, {
                            radius: 20,
                            blur: 15,
                            maxZoom: 11,
                            minOpacity: 0.35,
                            gradient: {
                                0.2: '#5a0000',
                                0.5: '#8b0000',
                                0.8: '#b22222',
                                1.0: '#ff4d4d'
                            }
                        });

                        deathsInReservationHeatLayerGroup.clearLayers();
                        deathsInReservationHeatLayerGroup.addLayer(reservationDeathsHeatLayer);
                    }

                    applyReservationVisibility();
                };

                updateTimelineControl();
                renderDeathLayers();

            });

            const agolDeathsOutsideLayer = L.esri.featureLayer({
                url: deathsOutsideLayerUrl,
                token: AGOL_TOKEN || undefined
            });
            agolDeathsOutsideLayer.query().where('1=1').run(function (error, featureCollection) {
                if (error) {
                    console.error('Failed to load deaths-outside-buffer features:', error);
                    return;
                }

                const outsideFeatures = (featureCollection.features || []).filter(feature => {
                    if (!isAllowedDeathCounty(feature)) return false;
                    const coords = getPointCoordinates(feature);
                    if (!coords) return false;
                    return !isPointInsideAnyReservation(coords[0], coords[1], tohonoReservationFeatures);
                });

                deathsOutsideLayerGroup.clearLayers();
                outsideFeatures.forEach(feature => {
                    const props = feature.properties || {};
                    const coords = getPointCoordinates(feature);
                    if (!coords) return;

                    const marker = deathPointToLayer(feature, L.latLng(coords[1], coords[0]));
                    marker.bindPopup(
                        `Sex: ${props.SEX || props.Sex || props.sex || 'N/A'}<br>` +
                        `Age: ${props.AGE || props.Age || props.age || 'N/A'}`
                    );
                    marker.on('click', function () {
                        if (measurementEnabled) {
                            measureToNearestWater(marker.getLatLng());
                        }
                    });
                    marker.addTo(deathsOutsideLayerGroup);
                });
            });
        }

        initAgolLayers();

        // Zoom-to-active-data function
        function zoomToActiveData() {
            const bounds = L.latLngBounds([]);

            if (map.hasLayer(waterStationsLayerGroup)) {
                waterStationsLayerGroup.eachLayer(layer => {
                    if (layer.getLatLng) bounds.extend(layer.getLatLng());
                });
            }

            if (map.hasLayer(migrantLayerGroup)) {
                migrantLayerGroup.eachLayer(layer => {
                    if (layer.getLatLng) bounds.extend(layer.getLatLng());
                });
            }

            if (map.hasLayer(deathsInReservationLayerGroup)) {
                deathsInReservationLayerGroup.eachLayer(layer => {
                    if (layer.getLatLng) bounds.extend(layer.getLatLng());
                });
            }

            if (map.hasLayer(deaths10MilesFromWaterLayerGroup)) {
                deaths10MilesFromWaterLayerGroup.eachLayer(layer => {
                    if (layer.getLatLng) bounds.extend(layer.getLatLng());
                });
            }

            if (map.hasLayer(summerDeathsLayerGroup)) {
                summerDeathsLayerGroup.eachLayer(layer => {
                    if (layer.getLatLng) bounds.extend(layer.getLatLng());
                });
            }

            if (map.hasLayer(restOfYearDeathsLayerGroup)) {
                restOfYearDeathsLayerGroup.eachLayer(layer => {
                    if (layer.getLatLng) bounds.extend(layer.getLatLng());
                });
            }

            if (bounds.isValid()) {
                map.fitBounds(bounds, {padding: [20, 20]});
            } else {
                alert('No data visible to zoom to. Enable at least one overlay layer.');
            }
        }

        // Zoom control button
        var zoomControl = L.control({position: 'topleft'});
        zoomControl.onAdd = function () {
            var div = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
            var link = L.DomUtil.create('a', '', div);
            link.title = 'Zoom to visible data';
            link.href = '#';
            link.innerHTML = '⤢';

            L.DomEvent.on(link, 'click', L.DomEvent.stopPropagation)
                .on(link, 'click', L.DomEvent.preventDefault)
                .on(link, 'click', zoomToActiveData);

            return div;
        };
        zoomControl.addTo(map);

        // In-map measurement control so users can access the tool without scrolling.
        var measureControl = L.control({position: 'topright'});
        measureControl.onAdd = function () {
            var div = L.DomUtil.create('div', 'leaflet-control');
            div.style.background = 'transparent';
            div.style.padding = '0';
            div.style.borderRadius = '0';
            div.style.boxShadow = 'none';
            div.style.maxWidth = 'none';
            div.innerHTML =
                '<button id="measureControlToggle" class="map-control-button" type="button">Measure distance to water</button>' +
                '<div id="measureControlPanel" class="map-control-panel">' +
                '<label for="routeProfileMap" style="display: block; font-size: 12px; margin-bottom: 6px; color: #222;">Route mode:</label>' +
                '<select id="routeProfileMap" style="padding: 6px 8px; width: 100%; margin-bottom: 8px;"><option value="driving">Driving</option><option value="walking">Walking</option><option value="straight">Straight line</option></select>' +
                '<button id="toggleMeasureMap" class="measure-button" style="cursor: pointer; width: 100%;">Enable nearest-water measure</button>' +
                '<div id="measureOutputMap" style="margin-top: 8px; font-size: 12px; color: #222; line-height: 1.3;">Nearest-water measure is off.</div>' +
                '</div>';

            L.DomEvent.disableClickPropagation(div);
            return div;
        };
        measureControl.addTo(map);

        var measureControlToggle = document.getElementById('measureControlToggle');
        var measureControlPanel = document.getElementById('measureControlPanel');
        if (measureControlToggle && measureControlPanel) {
            measureControlToggle.addEventListener('click', function () {
                measureControlPanel.classList.toggle('open');
            });

            map.on('click', function () {
                measureControlPanel.classList.remove('open');
            });
        }

        var timelineControl = L.control({position: 'topleft'});
        timelineControl.onAdd = function () {
            var div = L.DomUtil.create('div', 'leaflet-control time-control');
            div.innerHTML =
                '<label class="time-control-label" for="timelineRange">Deaths Over Time</label>' +
                '<div id="timelineValue" class="time-control-value">Loading timeline...</div>' +
                '<input id="timelineRange" type="range" min="0" max="0" value="0" disabled>';

            L.DomEvent.disableClickPropagation(div);
            return div;
        };
        timelineControl.addTo(map);

        timelineRangeInput = document.getElementById('timelineRange');
        timelineValueLabel = document.getElementById('timelineValue');
        timelineControlContainer = timelineRangeInput ? timelineRangeInput.closest('.time-control') : null;
        setTimelineControlVisibility(false);
        if (timelineRangeInput) {
            timelineRangeInput.addEventListener('input', function (e) {
                setTimelineIndex(Number(e.target.value));
            });
        }

        // Legend control
        var legend = L.control({position: 'topright'});
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<strong>Legend</strong><br>' +
                '<i style="background: #1e88ff; width: 10px; height: 10px; border-radius: 50%; border: 1px solid #0057d9;"></i> Water Stations<br>' +
                '<i style="background: red; width: 10px; height: 10px; border-radius: 50%; border: 1px solid #8b0000;"></i> Deaths<br>' +
                '<i style="background: #f4d03f; width: 10px; height: 10px; border-radius: 50%; border: 1px solid #b38b00;"></i> Deaths in June, July, August, and September<br>' +
                '<i style="background: #63b66d; width: 10px; height: 10px; border-radius: 50%; border: 1px solid #2f7d32;"></i> Deaths the rest of the year<br>' +
                '<i style="background: #e07cab; width: 10px; height: 10px; border-radius: 50%; border: 1px solid #c2578a;"></i> Deaths > 10 Miles from Water<br>';
            return div;
        };
        legend.addTo(map);

        function syncRouteProfile(targetValue) {
            const mapSelect = document.getElementById('routeProfileMap');
            if (mapSelect && mapSelect.value !== targetValue) mapSelect.value = targetValue;
            if (measurementEnabled) {
                setMeasurementEnabled(true);
            }
        }

        document.getElementById('routeProfileMap').addEventListener('change', function (e) {
            syncRouteProfile(e.target.value);
        });
        document.getElementById('toggleMeasureMap').addEventListener('click', function () {
            setMeasurementEnabled(!measurementEnabled);
        });

    </script>
</body>
